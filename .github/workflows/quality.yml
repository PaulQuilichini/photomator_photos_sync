name: Quality

on:
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Compile smoke check
        run: python tests/smoke_check.py

      - name: Flag parsing check
        run: python tests/flag_parsing_check.py

      - name: Duplicate matching check
        run: python tests/duplicate_matching_check.py
